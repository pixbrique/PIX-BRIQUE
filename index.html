<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixbrique | Art & Briques Premium</title>
  
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #050505;
      color: #e0e0e0;
      text-align: center;
      margin: 0;
    }

   /* --- LA NAVBAR (BANDEAU ENCORE PLUS GRAND) --- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 40px 5%; /* On augmente l'espace en haut et en bas */
      background: #0a0a0a;
      border-bottom: 4px solid #f1c40f; 
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    /* TAILLE DU LOGO AGRANDIE */
    .nav-logo-img {
      height: 300px; /* Passage de 90px à 150px pour un logo imposant */
      width: auto;
      transition: 0.3s;
    }

    .nav-links a { 
      color: white; 
      text-decoration: none; 
      margin-left: 30px; 
      font-weight: bold; 
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    .nav-links a:hover { color: #f1c40f; }

    /* --- PAGES --- */
    .page { display: none; padding: 100px 20px; animation: fadeIn 0.8s; }
    .active { display: block !important; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- BOUTONS OR --- */
    .buy-button { 
      display: inline-block; 
      background: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
      color: #111; 
      padding: 15px 35px; 
      text-decoration: none; 
      border-radius: 10px; 
      font-weight: bold; 
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }

    .buy-button:hover { 
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
    }

    .container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
    .card { background: #111; padding: 20px; border-radius: 20px; width: 300px; border: 1px solid #222; }
    .card img { width: 100%; border-radius: 15px; cursor: zoom-in; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" onclick="showPage('accueil')">
      <img src="https://i.ibb.co/VYfcybys/Sans-slogan-v2-removebg-preview.png" alt="Logo Pixbrique" class="nav-logo-img">
    </a>
    <div class="nav-links">
      <a onclick="showPage('accueil')">Accueil</a>
      <a onclick="showPage('boutique')">Boutique</a>
      <a onclick="showPage('contact')">Contact</a>
    </div>
  </nav>

  <div id="accueil" class="page active">
    <h1 style="color:#f1c40f; font-size: 3em;">Pixbrique : L'Art de la Brique</h1>
    <p>Découvrez des créations uniques et numérotées, assemblées à la main.</p>
    <br>
    <button class="buy-button" onclick="showPage('boutique')">Visiter la Galerie</button>
  </div>

  <div id="boutique" class="page">
    <h1 style="color:#f1c40f;">La Galerie</h1>
    <div class="container">
      <div class="card">
        <a href="https://i.ibb.co/v4Br5GHN/tableau-lion.png" target="_blank">
          <img src="https://i.ibb.co/v4Br5GHN/tableau-lion.png" alt="Lion">
        </a>
        <h3 style="color:white;">Tableau Lion</h3>
        <p style="color:#f1c40f; font-size: 1.5em; font-weight: bold;">150,00 €</p>
        <a href="https://buy.stripe.com/8x214h3IpdEg3gGdEA2wU00" class="buy-button">Acquérir cette pièce</a>
      </div>
    </div>
  </div>

  <div id="contact" class="page">
    <h1 style="color:#f1c40f;">Contact</h1>
    <p>Une question ? Un projet sur mesure ?</p>
    <p style="color:#f1c40f; font-weight: bold;">contact@pixbrique.com</p>
  </div>

  <script>
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      window.scrollTo(0, 0);
    }
  </script>

</body>
</html>
